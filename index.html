  <meta name="description" content="Official website of Benoît Prieur, author of technical books, expert articles, and publications on digital technologies." />
  <title>Benoît Prieur – Tech Books, Articles &amp; Publications</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q8WHXGDDWG"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {
      dataLayer.push(arguments);
    }
    gtag('js', new Date());
    gtag('config', 'G-Q8WHXGDDWG');
  </script>
  <script>
    (function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();
  </script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <nav>
        <a href="index.html">Home</a>
        <a href="tech_books.html">Tech Books</a>
        <a href="tech_articles.html">Tech Articles/Chapters</a>
        <a href="tech_videos.html">Tech Videos</a>
      </nav>
      <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light mode">
        <img id="theme-icon" src="images/moon.svg" alt="" width="18" height="18">
      </button>
    </div>
  </header>

  <main>
    <div class="main postit-container">
      <div class="postit language-note" id="postit-lang" data-postit="lang">
        <p>
          This site lists all of my tech publications. Most are in French; other languages are marked with the following flags:
        </p>
        <div class="language-legend">
          <span class="language-pill">
            <span class="drapeau-royaume-uni"></span>
            English
          </span>
          <span class="language-pill">
            <span class="drapeau-espagne"></span>
            Spanish
          </span>
        </div>
      </div>
      <div class="postit last-book" id="postit-book" data-postit="book">
        <span class="tag">Last published book</span>
        <a href="https://www.editions-eni.fr/livre/framework-pyqt-developpez-vos-interfaces-graphiques-en-python-avec-pyqt6-9782409050053">
          <img src="images/PyQt6.jpg" alt="PyQt6" class="index" />
        </a>
        <p class="caption">
          <span class="last-book-meta">June 2025 · <span class="book-title">PyQt6</span></span>
        </p>
      </div>
    </div>
  </main>

  <footer>
    <a href="https://orcid.org/0000-0003-0786-0049" target="_blank" rel="noopener" class="footer-orcid">
      <img src="images/orcid.svg" alt="ORCID" />
    </a>
  </footer>
  <script src="js/theme.js" defer></script>
  <script>
(function(){
  var k='postit-pos';
  var def={lang:{x:40,y:40},book:{x:340,y:40}};
  function load(){try{var s=localStorage.getItem(k);return s?JSON.parse(s):def;}catch(e){return def;}}
  function save(p){try{localStorage.setItem(k,JSON.stringify(p));}catch(e){}}
  var pos=load();
  var lang=document.getElementById('postit-lang');
  var book=document.getElementById('postit-book');
  if(lang){lang.style.left=(pos.lang?pos.lang.x:def.lang.x)+'px';lang.style.top=(pos.lang?pos.lang.y:def.lang.y)+'px';}
  if(book){book.style.left=(pos.book?pos.book.x:def.book.x)+'px';book.style.top=(pos.book?pos.book.y:def.book.y)+'px';}
  function drag(el,key){
    var startX,startY,ox,oy,moved;
    function move(e){
      var x=e.clientX||(e.touches&&e.touches[0].clientX);
      var y=e.clientY||(e.touches&&e.touches[0].clientY);
      if(x===undefined)return;
      var dx=x-startX,dy=y-startY;
      if(Math.abs(dx)>3||Math.abs(dy)>3)moved=true;
      pos[key].x=Math.max(0,ox+dx);
      pos[key].y=Math.max(0,oy+dy);
      el.style.left=pos[key].x+'px';
      el.style.top=pos[key].y+'px';
    }
    function stop(){document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',stop);document.removeEventListener('touchmove',move,{passive:false});document.removeEventListener('touchend',stop);save(pos);setTimeout(function(){moved=false;},0);}
    function start(e){
      e.preventDefault();
      moved=false;
      var x=e.clientX||(e.touches&&e.touches[0].clientX);
      var y=e.clientY||(e.touches&&e.touches[0].clientY);
      startX=x;startY=y;
      ox=pos[key].x;oy=pos[key].y;
      document.addEventListener('mousemove',move);
      document.addEventListener('mouseup',stop);
      document.addEventListener('touchmove',move,{passive:false});
      document.addEventListener('touchend',stop);
    }
    el.addEventListener('mousedown',start);
    el.addEventListener('touchstart',start,{passive:false});
    el.addEventListener('click',function(e){if(moved){e.preventDefault();e.stopPropagation();}},true);
  }
  if(lang){if(!pos.lang)pos.lang=def.lang;drag(lang,'lang');}
  if(book){if(!pos.book)pos.book=def.book;drag(book,'book');}
})();
  </script>
</body>
</html>
