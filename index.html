  <style>
    @keyframes postit-float-a {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(8px, -18px); }
      50% { transform: translate(-6px, -8px); }
      75% { transform: translate(-4px, -22px); }
    }
    @keyframes postit-float-b {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(-10px, -12px); }
      66% { transform: translate(6px, -20px); }
    }
    @keyframes postit-float-c {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-8px, -14px); }
      50% { transform: translate(10px, -6px); }
      75% { transform: translate(4px, -24px); }
    }
    .postit-container .postit {
      animation: postit-float-a 9s ease-in-out infinite;
    }
    .postit-container .postit.postit-dragging {
      animation-play-state: paused;
    }
    .postit-container .postit.language-note { animation: postit-float-a 9s ease-in-out infinite; animation-delay: 0s; }
    .postit-container .postit.last-book { animation: postit-float-b 11s ease-in-out infinite; animation-delay: 1s; }
    .postit-container .postit.postit-quakes { animation: postit-float-c 10s ease-in-out infinite; animation-delay: 3s; }
    @media (prefers-reduced-motion: reduce) {
      .postit-container .postit { animation: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <nav>
        <a href="index.html">Home</a>

  <main>

        <div class="language-groups">

          <div class="language-group">
            <span class="language-group-label">Other languages:</span>
            <div class="language-legend">
              <span class="language-pill"><span class="drapeau-royaume-uni"></span> EN</span>
              <span class="language-pill"><span class="drapeau-espagne"></span> ES</span>
            </div>
          </div>
        </div>
      </div>
      <div class="postit last-book" id="postit-book" data-postit="book">
        <span class="tag">LAST BOOK</span>
        <a href="https://www.editions-eni.fr/livre/framework-pyqt-developpez-vos-interfaces-graphiques-en-python-avec-pyqt6-9782409050053">
          <img src="images/PyQt6.jpg" alt="PyQt6 book cover" class="index" width="130" height="195" loading="lazy" />
        </a>
        <p class="caption"><a href="https://www.editions-eni.fr/livre/framework-pyqt-developpez-vos-interfaces-graphiques-en-python-avec-pyqt6-9782409050053"><span class="book-title">PyQt6</span></a> (2025)</p>
      </div>
      <div class="postit postit-quakes" id="postit-quakes" data-postit="quakes">
        <span class="tag">LAST QUAKES IN LA</span>
        <a href="tools/quakes.html" class="postit-quakes-link">
          <div class="postit-quakes-ornament" aria-hidden="true">
            <span class="postit-quakes-core"></span>
            <span class="postit-quakes-node postit-quakes-node-a"></span>
            <span class="postit-quakes-node postit-quakes-node-b"></span>
          </div>
          <span class="postit-quakes-copy"></span>
        </a>
        <small class="postit-quakes-source"><a href="https://earthquake.usgs.gov/earthquakes/feed/" target="_blank" rel="noopener">Source: USGS</a></small>

    </a>
  </footer>
  <script>
(function(){var k='theme';function g(){return localStorage.getItem(k)||'dark';}function s(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem(k,t);var i=document.getElementById('theme-icon');if(i)i.src=t==='dark'?'images/sun.svg':'images/moon.svg';}var b=document.getElementById('theme-toggle');if(b)b.onclick=function(){s(g()==='light'?'dark':'light');};s(g());})();
  </script>
  <script>
(function(){
  var k='postit-pos';
  var def={lang:{x:40,y:40},book:{x:328,y:80},quakes:{x:40,y:432}};
  function load(){try{var s=localStorage.getItem(k);return s?JSON.parse(s):def;}catch(e){return def;}}
  function save(p){try{localStorage.setItem(k,JSON.stringify(p));}catch(e){}}
  var pos=load();
  var lang=document.getElementById('postit-lang');
  var book=document.getElementById('postit-book');
  var quakes=document.getElementById('postit-quakes');
  var container=document.querySelector('.postit-container');
  var posts=[{el:lang,key:'lang'},{el:book,key:'book'},{el:quakes,key:'quakes'}];
  var bounds={w:0,h:0,pad:8};
  function updateBounds(){var r=container?container.getBoundingClientRect():{width:0,height:0};var ft=document.querySelector('footer');bounds.w=r.width;bounds.h=ft?Math.min(r.height,Math.max(0,ft.getBoundingClientRect().top-r.top)):r.height;}
  function clampPos(el,key){if(!container||!el)return;updateBounds();var p=bounds.pad,w=Math.max(0,bounds.w-el.offsetWidth-p),h=Math.max(0,bounds.h-el.offsetHeight-p);pos[key].x=Math.max(p,Math.min(w,pos[key].x));pos[key].y=Math.max(p,Math.min(h,pos[key].y));el.style.left=pos[key].x+'px';el.style.top=pos[key].y+'px';}
  function applyMobileLayout(){if(!container)return;updateBounds();if(bounds.w<600){var y=bounds.pad;posts.forEach(function(p){if(p.el){pos[p.key]={x:Math.max(bounds.pad,(bounds.w-p.el.offsetWidth)/2),y:y};y+=p.el.offsetHeight+16;}});}else{var loaded=load();posts.forEach(function(p){if(p.el&&loaded[p.key])pos[p.key]=loaded[p.key];});}posts.forEach(function(p){if(p.el)clampPos(p.el,p.key);});}
  posts.forEach(function(p){if(p.el){if(!pos[p.key])pos[p.key]=def[p.key];}});
  applyMobileLayout();
  if(container){updateBounds();window.addEventListener('resize',function(){applyMobileLayout();});}
  function drag(el,key){
    var startX,startY,ox,oy,moved;
    function move(e){
      el.style.cursor='grabbing';
      var x=e.clientX||(e.touches&&e.touches[0].clientX);
      var y=e.clientY||(e.touches&&e.touches[0].clientY);
      if(x===undefined)return;
      var dx=x-startX,dy=y-startY;
      if(Math.abs(dx)>3||Math.abs(dy)>3)moved=true;
      if(container)updateBounds();
      var p=bounds.pad;
      var maxX=Math.max(p,bounds.w-el.offsetWidth-p);
      var maxY=Math.max(p,bounds.h-el.offsetHeight-p);
      var nx=Math.max(p,Math.min(maxX,ox+dx));
      var ny=Math.max(p,Math.min(maxY,oy+dy));
      pos[key].x=nx;pos[key].y=ny;
      el.style.left=nx+'px';el.style.top=ny+'px';
    }
    function stop(e){document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',stop);document.removeEventListener('touchmove',move,{passive:false});document.removeEventListener('touchend',stop);el.classList.remove('postit-dragging');el.style.cursor='';if(!moved){var x=e.clientX||(e.changedTouches&&e.changedTouches[0].clientX),y=e.clientY||(e.changedTouches&&e.changedTouches[0].clientY);var links=el.querySelectorAll('a[href]');if(x!=null)for(var i=0;i<links.length;i++){var r=links[i].getBoundingClientRect();if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom){if(links[i].target==='_blank')window.open(links[i].href,'_blank');else window.location=links[i].href;break;}}}save(pos);setTimeout(function(){moved=false;},0);}
    function start(e){
      e.preventDefault();
      moved=false;
      el.classList.add('postit-dragging');
      var x=e.clientX||(e.touches&&e.touches[0].clientX);
      var y=e.clientY||(e.touches&&e.touches[0].clientY);
      startX=x;startY=y;
      ox=pos[key].x;oy=pos[key].y;
      document.addEventListener('mousemove',move);
      document.addEventListener('mouseup',stop);
      document.addEventListener('touchmove',move,{passive:false});
      document.addEventListener('touchend',stop);
    }
    function updateCursor(e){
      var x=e.clientX,y=e.clientY;
      if(x==null)return;
      var links=el.querySelectorAll('a[href]');
      var over=false;
      for(var i=0;i<links.length;i++){var r=links[i].getBoundingClientRect();if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom){over=true;break;}}
      el.style.cursor=over?'pointer':'grab';
    }
    el.addEventListener('mousemove',updateCursor);
    el.addEventListener('mouseleave',function(){el.style.cursor='grab';});
    el.addEventListener('mousedown',start);
    el.addEventListener('touchstart',start,{passive:false});
    el.addEventListener('click',function(e){if(moved){e.preventDefault();e.stopPropagation();}},true);
  }
  posts.forEach(function(p){if(p.el){if(!pos[p.key])pos[p.key]=def[p.key];drag(p.el,p.key);}});
})();
  </script>
</body>
