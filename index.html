  <script>

  function fishBlockedAt(x,y){if(!fish||!fishVisible)return false;var fr=fishRectAt(x,y);var obstacles=obstacleRects();for(var i=0;i<obstacles.length;i++){if(rectsOverlap(fr,obstacles[i]))return obstacles[i];}return null;}
  function fishStopX(obstacle){return obstacle.left-fish.offsetWidth+10;}
  function bumpFish(speed,boxRect,fishRect){if(!fish||!fishVisible)return;var r=fishRange(fish);var now=performance.now();var norm=Math.max(0,Math.min(1,speed/1800));var baseEase=norm*norm*norm;var midNorm=Math.max(0,Math.min(1,(norm-0.16)/0.64));var midBoost=Math.pow(midNorm,1.18);var ease=Math.min(1,baseEase+0.28*midBoost);var separationGap=1.5+5.5*ease;var reboundSpeed=8+164*ease;var driftDelay=160+760*ease;var targetX=pos.fish.x-(1.4+10*ease);if(boxRect){var penetration=fishRect?Math.max(0,fishRect.right-boxRect.left):0;targetX=Math.min(targetX,pos.fish.x-penetration-separationGap,boxRect.left-fish.offsetWidth-separationGap);fishState.hitShift=Math.min(-(0.75+3.4*norm+3.8*ease+Math.min(1.2,penetration*0.03)),fishState.hitShift);}pos.fish.x=Math.max(r.minX,targetX);fishState.vx=Math.min(fishState.vx,-reboundSpeed);fishState.resumeAt=now+driftDelay;fishState.lastTs=0;clampPos(fish,'fish');if(boxRect){var settledRect=rectInContainer(fish);if(settledRect&&rectsOverlap(settledRect,boxRect)){var remaining=Math.max(0,settledRect.right-boxRect.left);if(remaining>0){pos.fish.x=Math.max(r.minX,pos.fish.x-remaining-separationGap);clampPos(fish,'fish');}}}updateFishVisual();fish.classList.remove('swim-fish-bumped');void fish.offsetWidth;fish.classList.add('swim-fish-bumped');if(fishState.bumpTimer)clearTimeout(fishState.bumpTimer);fishState.bumpTimer=window.setTimeout(function(){fish.classList.remove('swim-fish-bumped');},320);}

  function applyMobileLayout(){if(!container)return;updateBounds();var loaded=load();if(bounds.w<600){var y=bounds.pad;posts.forEach(function(p){if(p.el&&p.key!=='fish'){pos[p.key]={x:Math.max(bounds.pad,(bounds.w-p.el.offsetWidth)/2),y:y};y+=p.el.offsetHeight+16;}});if(fish){pos.fish.y=loaded.fish&&typeof loaded.fish.y==='number'?loaded.fish.y:y+12;}}else{var wideDefaults=desktopLayout();var useWideDefaults=shouldUseAquariumDefaults(loaded);posts.forEach(function(p){if(!p.el)return;if(p.key==='fish'){if(loaded.fish&&typeof loaded.fish.y==='number')pos.fish.y=loaded.fish.y;}else if(useWideDefaults){pos[p.key]=wideDefaults[p.key];}else if(loaded[p.key]){pos[p.key]=loaded[p.key];}else{pos[p.key]=wideDefaults[p.key];}});}posts.forEach(function(p){if(p.el)clampPos(p.el,p.key);});}
  posts.forEach(function(p){if(p.el){if(!pos[p.key])pos[p.key]=def[p.key];}});
  updateFishVisual();
  applyMobileLayout();
  updateFishVisibility();
  if(fishToggle){fishToggle.addEventListener('click',function(){fishVisible=!fishVisible;updateFishVisibility();});}
  if(container){updateBounds();window.addEventListener('resize',function(){fishState.lastTs=0;applyMobileLayout();});}
  function animateFish(ts){if(!fish){return;}if(!fishState.lastTs)fishState.lastTs=ts;var dt=Math.min(0.05,(ts-fishState.lastTs)/1000);fishState.lastTs=ts;if(Math.abs(fishState.hitShift)>0.08){fishState.hitShift+=(0-fishState.hitShift)*Math.min(1,dt*11);}else if(fishState.hitShift!==0){fishState.hitShift=0;}updateFishVisual();if(!fishVisible){window.requestAnimationFrame(animateFish);return;}if(!fish.classList.contains('postit-dragging')){var r=fishRange(fish);if(ts<fishState.resumeAt){if(fishState.vx<0){fishState.vx=Math.min(0,fishState.vx+180*dt);if(fishState.vx>-6)fishState.vx=0;}else if(fishState.vx>0){fishState.vx=Math.max(0,fishState.vx-220*dt);}}else if(fishState.vx<fishState.cruiseSpeed){fishState.vx=Math.min(fishState.cruiseSpeed,fishState.vx+112*dt);}else if(fishState.vx>fishState.cruiseSpeed){fishState.vx=Math.max(fishState.cruiseSpeed,fishState.vx-120*dt);}var nextX=pos.fish.x+fishState.vx*dt;if(fishState.vx>0){if(nextX>r.maxX){pos.fish.x=r.minX;}else{var blocker=fishBlockedAt(nextX,pos.fish.y);if(blocker){pos.fish.x=Math.min(pos.fish.x,fishStopX(blocker));fishState.vx=0;}else{pos.fish.x=nextX;}}}else if(nextX<r.minX){pos.fish.x=r.minX;fishState.vx=Math.max(-18,fishState.vx*0.32);fishState.resumeAt=Math.min(fishState.resumeAt,ts+120);}else{pos.fish.x=nextX;}clampPos(fish,'fish');}window.requestAnimationFrame(animateFish);}

  function drag(el,key){
    var startX,startY,ox,oy,moved,lastPointerX,lastPointerY,lastPointerTs,lastHitTs;

      var ny=Math.max(p,Math.min(maxY,oy+dy));

    function start(e){
      if(key==='fish'&&!fishVisible)return;
      e.preventDefault();
      moved=false;
      el.classList.add('postit-dragging');
      if(key==='fish'){fishState.hitShift=0;updateFishVisual();}
      var x=e.clientX||(e.touches&&e.touches[0].clientX);
      var y=e.clientY||(e.touches&&e.touches[0].clientY);
      startX=x;startY=y;
      ox=pos[key].x;oy=pos[key].y;
      lastPointerX=x;lastPointerY=y;lastPointerTs=performance.now();lastHitTs=0;
      document.addEventListener('mousemove',move);
      document.addEventListener('mouseup',stop);
      document.addEventListener('touchmove',move,{passive:false});
      document.addEventListener('touchend',stop);
    }
    function updateCursor(e){
      var x=e.clientX,y=e.clientY;
      if(x==null)return;
      var links=el.querySelectorAll('a[href]');
      var over=false;
      for(var i=0;i<links.length;i++){var r=links[i].getBoundingClientRect();if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom){over=true;break;}}
      el.style.cursor=over?'pointer':'grab';
    }
    el.addEventListener('mousemove',updateCursor);
    el.addEventListener('mouseleave',function(){el.style.cursor='grab';});
    el.addEventListener('mousedown',start);
    el.addEventListener('touchstart',start,{passive:false});
    el.addEventListener('click',function(e){if(moved){e.preventDefault();e.stopPropagation();}},true);
  }
  posts.forEach(function(p){if(p.el){if(!pos[p.key])pos[p.key]=def[p.key];drag(p.el,p.key);}});
})();
  </script>
</body>
